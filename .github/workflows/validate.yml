name: Validate developer assets

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node -e "const fs=require('node:fs'); const files=['openapi/hilt-openapi-v1.json','postman/hilt-postman-collection.json','postman/hilt-postman-environment.json','examples/webhooks/payment.confirmed.json','examples/webhooks/delivery.failed.json']; for (const file of files) { JSON.parse(fs.readFileSync(file,'utf8')); console.log('validated ' + file); }"
      - run: node -e "const fs=require('node:fs'); const manifest=JSON.parse(fs.readFileSync('agent-discovery/hilt-agent.json','utf8')); if (manifest.schema_version !== 'hilt-agent-discovery-2026-06-01') throw new Error('bad manifest schema'); const rows=fs.readFileSync('agent-discovery/HILT_AGENT_DISCOVERY_PROMPT_SUITE_2026-06-01.csv','utf8').trim().split(/\r?\n/); if (rows.length < 10) throw new Error('prompt suite too small'); console.log('validated agent discovery assets');"
